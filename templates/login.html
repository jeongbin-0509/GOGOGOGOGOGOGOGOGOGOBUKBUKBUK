{% extends "base.html" %}
{% block title %}로그인{% endblock %}
{% block body %}
<main class="login-page container">
  <div class="login-card card">
    <div class="login-header">
      <img src="{{ url_for('static', filename='image/logo.svg') }}" alt="logo" class="login-logo">
      <h1>혜윰X세콜 &lt;돼지런한 여름방학&gt;</h1>
      <p class="caption">공부를 기록하고 성장하세요.</p>
    </div>
    <form class="login-form" method="post" novalidate>
      <div class="input-group">
        <label class="input-label" for="username">아이디</label>
        <input class="input" id="username" name="username" type="text" placeholder="아이디" autocomplete="username" required>
      </div>
      <div class="input-group">
        <label class="input-label" for="password">비밀번호</label>
        <input class="input" id="password" name="password" type="password" placeholder="비밀번호" autocomplete="current-password" required>
      </div>
      <div class="login-option">
        <label class="checkbox"><input type="checkbox" name="remember"><span>자동 로그인</span></label>
        <span class="muted">비밀번호 분실 시 운영진 문의</span>
      </div>
      <button class="btn btn-primary btn-lg btn-block" type="submit">로그인</button>
      <a class="btn btn-outline btn-lg btn-block" href="{{ url_for('signup') }}">회원가입</a>
    </form>
  </div>
</main>
{% endblock %}
