<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>로그인</title>

    <link
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />

    <link
      rel="shortcut icon"
      href="{{ url_for('static', filename='image/logo.png') }}"
      type="image/x-icon"
    />
  </head>

  <body>
    <main class="login-page container">
      <div class="login-card card">
        <div class="login-header">
          <img
            src="{{ url_for('static', filename='image/logo.png') }}"
            alt="로고"
            class="login-logo"
          />

          <h1>
            혜윰X세콜
            <br />
            &lt;돼지런한 여름방학&gt;
          </h1>

          <p class="caption">공부를 기록하고 성장하세요.</p>
        </div>

        <form id="loginForm" class="login-form">
          <div class="input-group">
            <label class="input-label" for="username"> 아이디 </label>

            <input
              id="username"
              name="username"
              class="input"
              type="text"
              placeholder="아이디"
              autocomplete="username"
              required
            />
          </div>

          <div class="input-group">
            <label class="input-label" for="password"> 비밀번호 </label>

            <input
              id="password"
              name="password"
              class="input"
              type="password"
              placeholder="비밀번호"
              autocomplete="current-password"
              required
            />
          </div>

          <div class="login-option">
            <label class="checkbox">
              <input id="remember" name="remember" type="checkbox" />

              <span> 자동 로그인 </span>
            </label>
          </div>

          <p id="loginMessage" class="form-message" hidden></p>

          <button class="btn btn-primary btn-lg btn-block" type="submit">
            로그인
          </button>

          <a
            class="btn btn-outline btn-lg btn-block"
            href="{{ url_for('signup') }}"
          >
            회원가입
          </a>
        </form>
      </div>
    </main>

    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
  </body>
</html>
