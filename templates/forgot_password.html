<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>비밀번호 찾기</title>

    <link
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/base.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/forgot_password.css') }}"
    />
    <link
      rel="shortcut icon"
      href="{{ url_for('static', filename='image/logo.png') }}"
      type="image/x-icon"
    />
  </head>

  <body>
    <main class="reset-page container">
      <section class="reset-card card">
        <header class="reset-header">
          <img
            class="reset-logo"
            src="{{ url_for('static', filename='image/logo.png') }}"
            alt="로고"
          />
          <h1>비밀번호 찾기</h1>
          <p class="caption">
            가입할 때 입력한 이름, 학번, 아이디를 입력하면 임시 비밀번호가 발급됩니다.
          </p>
        </header>

        <form id="forgotPasswordForm" class="reset-form">
          <div class="input-group">
            <label class="input-label" for="name">이름</label>
            <input
              id="name"
              class="input"
              type="text"
              maxlength="20"
              autocomplete="name"
              placeholder="이름"
              required
            />
          </div>

          <div class="input-group">
            <label class="input-label" for="studentId">학번</label>
            <input
              id="studentId"
              class="input"
              type="text"
              inputmode="numeric"
              minlength="5"
              maxlength="5"
              pattern="[0-9]{5}"
              placeholder="학번 5자리"
              required
            />
          </div>

          <div class="input-group">
            <label class="input-label" for="username">아이디</label>
            <input
              id="username"
              class="input"
              type="text"
              maxlength="30"
              autocomplete="username"
              placeholder="아이디"
              required
            />
          </div>

          <p id="forgotPasswordMessage" class="form-message" hidden></p>

          <button
            id="forgotPasswordButton"
            class="btn btn-primary btn-lg btn-block"
            type="submit"
          >
            임시 비밀번호 발급
          </button>

          <a
            class="btn btn-outline btn-lg btn-block"
            href="{{ url_for('login') }}"
          >
            로그인으로 돌아가기
          </a>
        </form>

        <section id="temporaryPasswordBox" class="temporary-password-box" hidden>
          <p class="temporary-password-label">임시 비밀번호</p>
          <strong id="temporaryPasswordValue"></strong>
          <button id="copyPasswordButton" class="copy-button" type="button">
            복사
          </button>
          <p>
            이 비밀번호로 로그인한 뒤 프로필에서 새 비밀번호로 변경해 주세요.
          </p>
        </section>
      </section>
    </main>

    <script src="{{ url_for('static', filename='js/forgot_password.js') }}"></script>
  </body>
</html>
