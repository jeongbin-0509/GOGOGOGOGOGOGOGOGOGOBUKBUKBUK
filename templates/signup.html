<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>회원가입</title>

    <link
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='styles/style.css') }}"
    >

    <link
        rel="shortcut icon"
        href="{{ url_for('static', filename='image/logo.png') }}"
        type="image/x-icon"
    >
</head>

<body>
    <main class="signup-page container">
        <div class="signup-card card">
            <h1>회원가입</h1>

            <form
                id="signupForm"
                class="signup-form"
            >
                <div class="input-group">
    <label class="input-label" for="student_id">학번</label>
    <input
        class="input"
        id="student_id"
        name="student_id"
        type="text"
        inputmode="numeric"
        maxlength="5"
        placeholder="학번 5자리"
        required
    >
</div>

                <div class="input-group">
                    <label
                        class="input-label"
                        for="student_id"    
                    >
                        학번
                    </label>

                    <input
                        id="student_id"
                        name="student_id"
                        class="input"
                        type="text"
                        maxlength="5"
                        placeholder="예 => 21121"
                        required
                    >
                </div>

                <div class="input-group">
                    <label
                        class="input-label"
                        for="username"
                    >
                        아이디
                    </label>

                    <input
                        id="username"
                        name="username"
                        class="input"
                        type="text"
                        minlength="4"
                        maxlength="30"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="input-group">
                    <label
                        class="input-label"
                        for="password"
                    >
                        비밀번호
                    </label>

                    <input
                        id="password"
                        name="password"
                        class="input"
                        type="password"
                        minlength="6"
                        autocomplete="new-password"
                        required
                    >
                </div>

                <div class="input-group">
                    <label
                        class="input-label"
                        for="passwordConfirm"
                    >
                        비밀번호 확인
                    </label>

                    <input
                        id="passwordConfirm"
                        name="password_confirm"
                        class="input"
                        type="password"
                        minlength="6"
                        autocomplete="new-password"
                        required
                    >
                </div>

                <label class="checkbox">
                    <input
                        id="termsAgree"
                        type="checkbox"
                        required
                    >

                    <span>
                        이용약관에 동의합니다.
                    </span>
                </label>

                <label class="checkbox">
                    <input
                        id="privacyAgree"
                        type="checkbox"
                        required
                    >

                    <span>
                        개인정보 처리방침에 동의합니다.
                    </span>
                </label>

                <p
                    id="signupMessage"
                    hidden
                ></p>

                <button
                    class="btn btn-primary btn-lg btn-block"
                    type="submit"
                >
                    회원가입
                </button>

                <a
                    class="btn btn-outline btn-lg btn-block"
                    href="{{ url_for('login') }}"
                >
                    로그인으로
                </a>
            </form>
        </div>
    </main>

    <script
        src="{{ url_for('static', filename='js/signup.js') }}"
    ></script>
</body>
</html>
