<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>회원가입</title>

    <link
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
      rel="stylesheet"
    />

    <link
  rel="stylesheet"
  href="{{ url_for('static', filename='css/base.css') }}"
/>

<link
  rel="stylesheet"
  href="{{ url_for('static', filename='css/signup.css') }}"
/>

    <link
      rel="shortcut icon"
      href="{{ url_for('static', filename='image/logo.png') }}"
      type="image/x-icon"
    />
  </head>

  <body>
    <main class="signup-page container">
      <div class="signup-card card">
        <div class="signup-header">
          <img
            src="{{ url_for('static', filename='image/logo.png') }}"
            alt="로고"
            class="signup-logo"
          />

          <h1>회원가입</h1>

          <p class="caption">공부 기록을 시작해보세요.</p>
        </div>

        <form id="signupForm" class="signup-form">
          <div class="input-group">
            <label class="input-label" for="name"> 이름 </label>

            <input
              id="name"
              name="name"
              class="input"
              type="text"
              maxlength="20"
              placeholder="이름"
              autocomplete="name"
              required
            />
          </div>

          <div class="input-group">
            <label class="input-label" for="student_id"> 학번 </label>

            <input
              id="student_id"
              name="student_id"
              class="input"
              type="text"
              inputmode="numeric"
              maxlength="5"
              placeholder="예: 21121"
              autocomplete="off"
              required
            />
          </div>

          <div class="input-group">
            <label class="input-label" for="username"> 아이디 </label>

            <input
              id="username"
              name="username"
              class="input"
              type="text"
              minlength="4"
              maxlength="30"
              placeholder="영문, 숫자, 밑줄 사용 가능"
              autocomplete="username"
              required
            />
          </div>

          <div class="input-group">
            <label class="input-label" for="password"> 비밀번호 </label>

            <input
              id="password"
              name="password"
              class="input"
              type="password"
              minlength="6"
              maxlength="100"
              placeholder="6자 이상 입력"
              autocomplete="new-password"
              required
            />
          </div>

          <div class="input-group">
            <label class="input-label" for="passwordConfirm">
              비밀번호 확인
            </label>

            <input
              id="passwordConfirm"
              name="password_confirm"
              class="input"
              type="password"
              minlength="6"
              maxlength="100"
              placeholder="비밀번호 다시 입력"
              autocomplete="new-password"
              required
            />
          </div>
<div class="privacy-agreement">
  <label class="privacy-check-label" for="privacyAgree">
    <input
      id="privacyAgree"
      name="privacy_agree"
      type="checkbox"
      value="true"
      required
    />

    <span>
      개인정보 수집 및 이용에 동의합니다.
      <strong>(필수)</strong>
    </span>
  </label>

  <details class="privacy-details">
    <summary>개인정보 수집 및 이용 내용 보기</summary>

    <div class="privacy-content">
      <p>
        <strong>수집 항목</strong><br />
        이름, 학번, 아이디, 비밀번호
      </p>

      <p>
        <strong>이용 목적</strong><br />
        회원 식별, 로그인, 공부 기록 및 랭킹 서비스 제공
      </p>

      <p>
        <strong>보유 기간</strong><br />
        회원 탈퇴 또는 서비스 종료 시까지
      </p>

      <p>
        개인정보 수집 및 이용에 동의하지 않을 수 있으나,
        동의하지 않으면 회원가입이 불가능합니다.
      </p>
    </div>
  </details>
</div>
          <p id="signupMessage" class="form-message" hidden></p>

          <button class="btn btn-primary btn-lg btn-block" type="submit">
            회원가입
          </button>

          <a
            class="btn btn-outline btn-lg btn-block"
            href="{{ url_for('login') }}"
          >
            로그인으로
          </a>
        </form>
      </div>
    </main>

    <script src="{{ url_for('static', filename='js/signup.js') }}"></script>
  </body>
</html>
