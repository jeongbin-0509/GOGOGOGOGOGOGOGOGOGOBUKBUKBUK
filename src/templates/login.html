<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>로그인</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link rel="stylesheet" href="../styles/style.css">
<link rel="shortcut icon" href="../image/logo.png" type="image/x-icon">
</head>
<body>
<main class="login-page container">
<div class="login-card card">
<div class="login-header">
<img src="../image/logo.png" alt="logo" class="login-logo">
<h1>혜윰X세콜 &lt;돼지런한 여름방학&gt;</h1>
<p class="caption">공부를 기록하고 성장하세요.</p>
</div>

<form class="login-form">
<div class="input-group">
<label class="input-label">아이디</label>
<input class="input" type="text" placeholder="아이디">
</div>
<div class="input-group">
<label class="input-label">비밀번호</label>
<input class="input" type="password" placeholder="비밀번호">
</div>

<div class="login-option">
<label class="checkbox">
    <input type="checkbox">
    <span>자동 로그인</span>
</label>
<a href="#">비밀번호 찾기</a>
</div>

<button class="btn btn-primary btn-lg btn-block">로그인</button>
<a class="btn btn-outline btn-lg btn-block" href="./signup.html">회원가입</a>
</form>
</div>
</main>
</body>
</html>
