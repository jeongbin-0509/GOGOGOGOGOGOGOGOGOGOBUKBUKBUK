<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>회원가입</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link rel="stylesheet" href="../styles/style.css">
<link rel="shortcut icon" href="../image/logo.png" type="image/x-icon">
</head>
<body>
<main class="signup-page container">
<div class="signup-card card">
<h1>회원가입</h1>
<form class="signup-form">
<div class="input-group"><label class="input-label">이름</label><input class="input"></div>
<div class="signup-grid">
<div class="input-group"><label class="input-label">학년</label><input class="input"></div>
<div class="input-group"><label class="input-label">반</label><input class="input"></div>
<div class="input-group"><label class="input-label">번호</label><input class="input"></div>
</div>
<div class="input-group"><label class="input-label">아이디</label><input class="input"></div>
<div class="input-group"><label class="input-label">비밀번호</label><input class="input" type="password"></div>
<div class="input-group"><label class="input-label">비밀번호 확인</label><input class="input" type="password"></div>
<label class="checkbox">
    <input type="checkbox">
    <span>이용약관에 동의합니다.</span>
</label>
<label class="checkbox">
    <input type="checkbox">
    <span>개인정보 처리방침에 동의합니다.</span>
</label>
<button class="btn btn-primary btn-lg btn-block">회원가입</button>
<a class="btn btn-outline btn-lg btn-block" href="./login.html">로그인으로</a>
</form>
</div>
</main>
</body>
</html>
